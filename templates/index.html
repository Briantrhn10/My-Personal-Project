<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Identifikasi Teknik Pukulan Bola Voli</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <style>
    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e0f7fa, #ffffff);
      background-image: url("{{ url_for('static', filename='wave.svg') }}");
      background-repeat: no-repeat;
      background-size: cover;
      background-position: bottom;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    main {
      flex: 1;
    }
    .card {
      border: none;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.1);
      border-radius: 16px;
    }
    .btn-primary {
      background-color: #1da1f2;
      border: none;
      font-weight: 600;
    }
    .btn-primary:hover {
      background-color: #0c7abf;
    }

    /* Splash screen */
    #splash {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transition: opacity 0.5s ease;
    }
    .splash-content img {
      width: 150px;
    }
    .splash-content h1 {
      font-family: 'Poppins', sans-serif;
      margin-top: 20px;
      font-size: 32px;
      color: #0B2B4C;
    }
    /* Progress Bar */
    .progress-bar-container {
      margin-top: 30px;
      width: 200px;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar {
      width: 0%;
      height: 100%;
      background-color: #1da1f2;
      animation: progressLoad 2s forwards;
    }
    @keyframes progressLoad {
      0% { width: 0%; }
      100% { width: 100%; }
    }
    @keyframes fadeInLogo {
      from { opacity: 0; }
      to { opacity: 0.1; }
    }
  </style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <div class="splash-content">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
    <h1 class="mt-3">Volley Vision</h1>
    <div class="progress-bar-container">
      <div class="progress-bar"></div>
    </div>
  </div>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #0B2B4C;">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="/">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" width="30" height="30" class="me-2" />
      Volley Vision
    </a>
    <div class="ms-auto">
      <a class="nav-link text-white" href="/about">About</a>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="container mt-5">
  <div class="card p-5 mx-auto" style="max-width: 600px;">
    <h2 class="text-center mb-3">Upload Video Teknik Pukulan Bola Voli</h2>
    <p class="text-center text-muted">Unggah video untuk dianalisis menggunakan YOLO dan LSTM.</p>

    <form method="POST" enctype="multipart/form-data" action="/predict">
      <div class="mb-3">
        <label for="file" class="form-label">Pilih video (MP4/AVI):</label>
        <input type="file" class="form-control" id="file" name="file" accept=".mp4,.avi" required />
      </div>
      <button type="submit" class="btn btn-primary w-100">Upload dan Analisis</button>
    </form>
  </div>
</main>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3">
  © 2025 Volley Vision. All rights reserved.
</footer>

<!-- Logo watermark pojok kanan bawah -->
<img src="{{ url_for('static', filename='logo.png') }}"
     alt="Logo Watermark"
     style="position: fixed; bottom: 20px; right: 20px; width: 120px; opacity: 0.1; pointer-events: none; z-index: 0;
     animation: fadeInLogo 2s ease-out forwards;" />

<!-- Script: Splash Fade Out Once -->
<script>
  window.addEventListener('load', function () {
    const splash = document.getElementById('splash');
    if (!sessionStorage.getItem('splashShown')) {
      splash.style.opacity = 1;
      setTimeout(() => {
        splash.style.opacity = 0;
        setTimeout(() => {
          splash.style.display = 'none';
        }, 500);
      }, 2000); // Splash tahan 2 detik
      sessionStorage.setItem('splashShown', 'true');
    } else {
      splash.style.display = 'none';
    }
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
